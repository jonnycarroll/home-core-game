<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Core</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pre-start">
    <canvas id="game-canvas"></canvas>
    <div id="welcome-screen" aria-label="Start game">
        <button id="start-button" type="button">Place the Blue Core</button>
    </div>
    <section id="hud" aria-label="Base status">
        <div class="hud-grid">
            <div>
                <span class="label">Energy</span>
                <strong id="energy-value">0</strong>
                <small id="energy-rate">+0/s</small>
            </div>
            <div>
                <span class="label">Research</span>
                <strong id="research-value">0</strong>
                <small id="research-rate">+0/s</small>
            </div>
            <div>
                <span class="label">Base</span>
                <strong id="base-level">1</strong>
                <small id="base-xp">0 / 0 XP</small>
            </div>
        </div>
        <div class="xp-track"><div id="xp-fill"></div></div>
    </section>

    <aside id="side-panel" aria-label="Tile and research controls">
        <div id="selected-panel">
            <h1 id="tile-title">Home Core</h1>
            <p id="tile-details"></p>
            <button id="tile-action" type="button">Select</button>
        </div>

        <div id="skills-panel">
            <h2>Research</h2>
            <button class="skill-button" type="button" data-skill="expansion">
                <span>Expansion</span>
                <small id="skill-expansion">Level 0</small>
            </button>
            <button class="skill-button" type="button" data-skill="production">
                <span>Production</span>
                <small id="skill-production">Level 0</small>
            </button>
            <button class="skill-button" type="button" data-skill="surveying">
                <span>Surveying</span>
                <small id="skill-surveying">Level 0</small>
            </button>
        </div>
    </aside>

    <div id="viewport-controls" aria-label="Viewport controls">
        <button id="center-button" class="icon-button" type="button" title="Return to Home Core" aria-label="Return to Home Core">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 22s7-5.5 7-12a7 7 0 0 0-14 0c0 6.5 7 12 7 12Z"></path>
                <circle cx="12" cy="10" r="2.5"></circle>
            </svg>
        </button>
        <button id="theme-toggle" class="icon-button" type="button" title="Theme: System" aria-label="Theme: System">
            <svg class="theme-icon theme-icon-system" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2.5M12 19.5V22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M2 12h2.5M19.5 12H22M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"></path>
                <path d="M14 6.3A6.5 6.5 0 1 0 14 17.7A5.1 5.1 0 0 1 14 6.3Z"></path>
            </svg>
            <svg class="theme-icon theme-icon-light" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2.5M12 19.5V22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M2 12h2.5M19.5 12H22M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"></path>
            </svg>
            <svg class="theme-icon theme-icon-dark" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19.2 15.2A7.5 7.5 0 0 1 8.8 4.8a8 8 0 1 0 10.4 10.4Z"></path>
            </svg>
        </button>
    </div>
    
    <script src="appearance.js"></script>
    <script src="iso-math.js"></script>
    <script src="game-state.js"></script>
    <script src="materials.js"></script>
    <script src="object-layout.js"></script>
    <script src="scene.js"></script>
    <script src="tile-renderer.js"></script>
    <script src="object-renderer.js"></script>
    <script src="map-glyphs.js"></script>
    <script src="grid.js"></script>
    <script src="main.js"></script>
</body>
</html>
