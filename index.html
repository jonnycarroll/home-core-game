<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Core</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="pre-start">
    <canvas id="game-canvas"></canvas>
    <div id="welcome-screen" aria-label="Start game">
        <button id="start-button" type="button">Place the Blue Core</button>
    </div>
    <aside id="side-panel" aria-label="Tile controls">
        <div id="selected-panel">
            <h1 id="tile-title">Blue Core</h1>
            <p id="tile-details"></p>
            <button id="tile-action" type="button">Select</button>
        </div>
    </aside>

    <div id="theme-controls" aria-label="Display controls">
        <button id="theme-toggle" class="icon-button" type="button" title="Theme: System" aria-label="Theme: System">
            <svg class="theme-icon theme-icon-system" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2.5M12 19.5V22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M2 12h2.5M19.5 12H22M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"></path>
                <path d="M14 6.3A6.5 6.5 0 1 0 14 17.7A5.1 5.1 0 0 1 14 6.3Z"></path>
            </svg>
            <svg class="theme-icon theme-icon-light" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2.5M12 19.5V22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M2 12h2.5M19.5 12H22M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"></path>
            </svg>
            <svg class="theme-icon theme-icon-dark" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19.2 15.2A7.5 7.5 0 0 1 8.8 4.8a8 8 0 1 0 10.4 10.4Z"></path>
            </svg>
        </button>
    </div>

    <section id="hud" aria-label="Base status">
        <div class="hud-panel status-panel">
            <div class="status-metrics">
                <div class="resource-counter">
                    <svg class="resource-glyph energy-glyph" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M13.8 2.5 5.8 13h5.4l-1 8.5 8-11h-5.3Z"></path>
                    </svg>
                    <div class="resource-value">
                        <strong id="energy-value">0</strong>
                        <small id="energy-rate">+0/s</small>
                    </div>
                </div>
                <div class="resource-counter research-counter">
                    <svg class="resource-glyph research-glyph" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="2.2"></circle>
                        <ellipse cx="12" cy="12" rx="8.2" ry="3.2"></ellipse>
                        <ellipse cx="12" cy="12" rx="8.2" ry="3.2" transform="rotate(60 12 12)"></ellipse>
                        <ellipse cx="12" cy="12" rx="8.2" ry="3.2" transform="rotate(-60 12 12)"></ellipse>
                    </svg>
                    <div class="resource-value">
                        <strong id="research-value">0</strong>
                        <small id="research-rate">+0/s</small>
                    </div>
                </div>
                <div class="progress-content">
                    <div class="progress-header">
                        <small id="base-xp">0 / 0 XP</small>
                        <strong id="base-level">1</strong>
                    </div>
                    <div class="xp-track"><div id="xp-fill"></div></div>
                </div>
            </div>
            <button id="center-button" class="hud-button home-button" type="button" title="Return to Blue Core" aria-label="Return to Blue Core">
                <svg viewBox="0 0 32 32" aria-hidden="true">
                    <path class="core-top" d="M16 3 28 9 16 15 4 9Z"></path>
                    <path class="core-right" d="M16 15 28 9 28 20 16 27Z"></path>
                    <path class="core-left" d="M16 15 4 9 4 20 16 27Z"></path>
                    <path class="core-line" d="M16 3 28 9 28 20 16 27 4 20 4 9Z"></path>
                    <path class="core-line" d="M4 9 16 15 28 9M16 15v12"></path>
                </svg>
            </button>
        </div>
    </section>

    <div id="tech-overlay" hidden>
        <section id="tech-panel" aria-label="Tech tree">
            <header class="tech-header">
                <div>
                    <span class="label">Blue Core Upgrade</span>
                    <h2 id="tech-title">Tech Tree</h2>
                </div>
                <strong id="tech-points">0 Research</strong>
            </header>
            <p id="tech-award">Research awarded from the new Blue Core level.</p>
            <div class="tech-grid">
                <button class="tech-button" type="button" data-tech="energy">
                    <span>Energy Amplifier</span>
                    <small id="tech-energy">Level 0</small>
                </button>
                <button class="tech-button" type="button" data-tech="research">
                    <span>Research Lens</span>
                    <small id="tech-research">Level 0</small>
                </button>
            </div>
            <button id="resume-run" type="button">Resume Run</button>
        </section>
    </div>
    
    <script src="canvas-tokens.js"></script>
    <script src="appearance.js"></script>
    <script src="iso-math.js"></script>
    <script src="game-state.js"></script>
    <script src="materials.js"></script>
    <script src="object-layout.js"></script>
    <script src="scene.js"></script>
    <script src="tile-renderer.js"></script>
    <script src="object-renderer.js"></script>
    <script src="map-glyphs.js"></script>
    <script src="grid.js"></script>
    <script src="main.js"></script>
</body>
</html>
